kind = "web"
previewPath = "/"
title = "ChabadLabs.ai"
version = "1.0.0"
id = "artifacts/chabadlabs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22674
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/chabadlabs run dev"

[services.env]
PORT = "22674"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/chabadlabs", "run", "build"]
publicDir = "artifacts/chabadlabs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
